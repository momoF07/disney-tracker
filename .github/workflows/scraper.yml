name: Disney Scraper Bot

on:
  schedule:
    # S'exécute toutes les 10 minutes (Format Cron)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permet de lancer le script manuellement depuis l'interface GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout du dépôt
        uses: actions/checkout@v4

      - name: 🐍 Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Installation des bibliothèques
        run: |
          pip install requests supabase pandas

      - name: 🚀 Exécution du script
        env:
          # On lie les secrets GitHub aux variables d'environnement du script
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper.py
