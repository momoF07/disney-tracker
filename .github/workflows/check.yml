name: Disney Check

on:
  schedule:
    - cron: '*/5 * * * *'  # Toutes les 5 min, 24h/24
  workflow_dispatch:      # Garde le bouton manuel

jobs:
  run-robot:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4 # Version plus récente

      - name: 🐍 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Deps
        run: pip install requests supabase

      - name: 🚀 Run
        run: python worker.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
