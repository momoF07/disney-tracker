name: Disney Check

on:
  schedule:
    - cron: '*/10 * * * *'    # Relance automatique toutes les 10 min
  workflow_dispatch:          # Pour lancer manuellement depuis GitHub ou ton bouton Streamlit
  repository_dispatch:        # Pour les appels externes (Cron-job.org, etc.)
    types: [run-disney-bot]

jobs:
  run-robot:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: pip install requests supabase pytz

      - name: 🚀 Run Worker and Weather
        run: python worker.py weather_data.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
